<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Homework 2</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style-hw2.css" />

</head>
<body>
    <div class="card">
    <h1 class="card-title">Depth</h1>
    <p class="card-subtitle">
      Our employment and income outcomes within 3 and<br>
      6 months of program completion
    </p>

    <div class="stat-group">
      <div class="stat-badge badge-large">82%</div>
      <p class="stat-desc">
        of graduates placed in jobs within six months<br>
        of program completion (73% at three months)
      </p>
    </div>

    <div class="stat-group">
      <div class="stat-badge badge-slim">$1.5 billion</div>
      <p class="stat-desc">
        in cumulative wages earned by graduates<br>
        since 2015
      </p>
    </div>
  </div>

</body>
</html>
